name: Deploy to GitHub Pages (Manual - Dev-1 only)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Deploy branch (Dev-1 or main)'
        required: true
        type: choice
        options:
          - Dev-1
          - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          echo "Deploying from branch: ${{ github.ref_name }}"
          echo "Requested branch: ${{ github.event.inputs.branch }}"
          
          if [[ "${{ github.ref_name }}" != "${{ github.event.inputs.branch }}" ]]; then
            echo "❌ Error: Current branch (${{ github.ref_name }}) does not match requested branch (${{ github.event.inputs.branch }})"
            exit 1
          fi

      - name: Remove admin folder if main branch
        if: github.event.inputs.branch == 'main'
        run: |
          echo "🔒 Removing admin folder (main branch deployment)"
          rm -rf frontend/admin
          echo "✓ Admin folder removed"

      - name: Prepare deployment
        if: github.event.inputs.branch == 'Dev-1'
        run: |
          echo "✓ Preparing Dev-1 deployment with admin panel"

      - name: Copy backend JS files and adjust paths for GitHub Pages compatibility
        run: |
          echo "📦 Copying backend JS files to frontend/backend/js..."
          mkdir -p frontend/backend/js
          cp -r backend/js/* frontend/backend/js/
          
          echo "🔄 Adjusting import paths in JavaScript files..."
          # Replace relative imports going outside frontend root (../../backend/js/) with (../backend/js/)
          find frontend -name "*.js" -type f -exec sed -i 's|\.\./\.\./backend/js/|\.\./backend/js/|g' {} +
          echo "✓ Paths adjusted successfully!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "📊 Deployment Summary"
          echo "═══════════════════════════════════════"
          echo "Branch: ${{ github.event.inputs.branch }}"
          echo "Admin Panel Included: ${{ github.event.inputs.branch == 'Dev-1' && 'Yes ✓' || 'No (Removed)' }}"
          echo "Deployment URL: ${{ steps.deployment.outputs.page_url }}"
          echo "═══════════════════════════════════════"
